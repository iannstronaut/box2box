<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/b2b-light.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="iannstonaut (https://github.com/iannstronaut)" />
    <meta name="theme-color" content="#5b5bf0" />
    <meta
      name="description"
      content="Box2Box — a calm, local-first studio for drawing bounding boxes and exporting training-ready datasets. Your images never leave your machine."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Box2Box — Local-first image annotation</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("box2box.theme");
          var mode = stored || "system";
          var resolved =
            mode === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : mode;
          if (resolved === "dark") document.documentElement.classList.add("dark");
          document.documentElement.dataset.theme = resolved;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
